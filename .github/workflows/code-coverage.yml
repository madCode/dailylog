name: Kover Coverage Report

on:
  pull_request:
    branches: [ "main" ] # Adjust to your default branch

jobs:
  kover-report:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required to post comments

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '17'

      # 1. Run Kover Tasks
      # koverHtmlReport generates the HTML for manual inspection if needed
      # koverVerify checks coverage against your defined rules
      # koverXmlReport is often needed by the reporting action
      - name: Run Kover Report & Verify
        run: ./gradlew koverHtmlReport koverXmlReport koverVerify

      # 2. Post Results as PR Comment
      - name: Post Kover Report
        uses: mi-kas/kover-report@v1
        with:
          # Path to the generated XML report(s)
          path: |
            ${{ github.workspace }}/**/build/reports/kover/report.xml
          title: "Code Coverage Report"
          update-comment: true # Updates existing comment on new pushes
          min-coverage-overall: 3 # Optional: will fail the step if below this
